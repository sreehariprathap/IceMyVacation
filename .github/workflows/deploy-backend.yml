name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear Render build cache before deploying'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify backend builds cleanly
        run: |
          pip install -r backend/requirements.txt --quiet
          python -c "import backend.main" 2>/dev/null || python -c "
          import sys; sys.path.insert(0, 'backend')
          import importlib.util
          spec = importlib.util.spec_from_file_location('main', 'backend/main.py')
          mod = importlib.util.module_from_spec(spec)
          print('Backend imports OK')
          "

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          PAYLOAD="{\"clearCache\": ${{ inputs.clear_cache || 'false' }}}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy trigger failed with status $HTTP_CODE"
            exit 1
          fi

          DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['id'])")
          echo "Deploy ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deploy to complete
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Polling deploy status..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['status'])")

            echo "[$i/30] Status: $STATUS"

            if [ "$STATUS" = "live" ]; then
              echo "Deploy succeeded!"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi

            sleep 20
          done

          echo "Deploy timed out after 10 minutes"
          exit 1
