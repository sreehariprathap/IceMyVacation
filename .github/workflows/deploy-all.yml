name: Deploy All (Frontend + Backend)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend-only
          - backend-only
      environment:
        description: 'Vercel environment (frontend only)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview
      clear_cache:
        description: 'Clear Render build cache (backend only)'
        required: false
        default: false
        type: boolean

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: inputs.target == 'all' || inputs.target == 'backend-only'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          PAYLOAD="{\"clearCache\": ${{ inputs.clear_cache || 'false' }}}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy trigger failed: $BODY"
            exit 1
          fi

          DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['id'])")
          echo "Render deploy triggered: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['status'])")
            echo "[$i/30] Render status: $STATUS"
            if [ "$STATUS" = "live" ]; then echo "Backend live!"; exit 0; fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Backend deploy failed: $STATUS"; exit 1
            fi
            sleep 20
          done
          echo "Render deploy timed out"; exit 1

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: inputs.target == 'all' || inputs.target == 'frontend-only'
    needs: []   # runs in parallel with backend when target=all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          if [ "${{ inputs.environment }}" = "production" ]; then
            vercel deploy --prod --token $VERCEL_TOKEN
          else
            vercel deploy --token $VERCEL_TOKEN
          fi
